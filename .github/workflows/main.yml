name: Build and Release MAUI App

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Gives GitHub permission to create a Release

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Install MAUI Workloads
      run: dotnet workload install maui

    - name: Restore Dependencies
      run: dotnet restore -p:TargetFramework=net9.0-android

    - name: Publish Android App
      run: dotnet publish -c Release -f net9.0-android -p:TargetFramework=net9.0-android -r android-arm64 /p:AndroidPackageFormat=apk

    - name: Sign Android APK
      run: |
        echo "Searching for keystore, tools, and signing the release APK..."
        # Finds the keystore anywhere in the workspace dynamically
        $keystorePath = Get-ChildItem -Path . -Filter "scorekeeper.keystore" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        
        # Finds the compiled unsigned APK dynamically
        $apkPath = Get-ChildItem -Path . -Filter "*-Signed.apk" -Recurse | Where-Object { $_.FullName -notmatch "ScoreKeeper-Final.apk" } | Select-Object -First 1 -ExpandProperty FullName
        
        # Safely resolves the apksigner path from the android home directory
        $apksignerPath = Get-ChildItem -Path "$env:ANDROID_HOME" -Filter "apksigner.bat" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        
        # Execute the signing command
        & "$apksignerPath" sign --ks "$keystorePath" --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --out ScoreKeeper-Final.apk "$apkPath"

    - name: Create Automated Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          ScoreKeeper-Final.apk

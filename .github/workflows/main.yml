name: Build and Release MAUI App

on:
  push:
    branches: [ "main" ] # Runs every time you push code to the main branch

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # Matches your MAUI version

    - name: Install MAUI Workloads
      run: dotnet workload install maui

    - name: Publish Android App
      run: dotnet publish -c Release -f net8.0-android --no-restore /p:AndroidPackageFormat=apk

    - name: Upload APK Installer
      uses: actions/upload-artifact@v4
      with:
        name: ScoreKeeper-Installer
        path: |
          **/*.apk

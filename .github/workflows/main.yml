name: Build and Release MAUI App

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install MAUI Workloads
      run: dotnet workload install maui

    # === UPDATE THIS STEP TO TARGET ANDROID ===
    - name: Restore Dependencies
      run: dotnet restore -p:TargetFramework=net8.0-android

    # === UPDATE THIS STEP AS WELL ===
    - name: Publish Android App
      run: dotnet publish -c Release -f net8.0-android -p:TargetFramework=net8.0-android /p:AndroidPackageFormat=apk

    - name: Upload APK Installer
      uses: actions/upload-artifact@v4
      with:
        name: ScoreKeeper-Installer
        path: |
          **/*.apk

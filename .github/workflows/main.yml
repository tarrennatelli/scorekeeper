name: Build and Release MAUI App

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Crucial: Gives GitHub permission to create a Release

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Install MAUI Workloads
      run: dotnet workload install maui

    - name: Restore Dependencies
      run: dotnet restore -p:TargetFramework=net9.0-android

    - name: Publish Android App
      run: dotnet publish -c Release -f net9.0-android -p:TargetFramework=net9.0-android -r android-arm64 /p:AndroidPackageFormat=apk

    - name: Rename APK for Clarity
      run: |
        ren src\bin\Release\net9.0-android\*-Signed.apk ScoreKeeper.apk
      continue-on-error: true

    - name: Create Automated Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          **/*-Signed.apk
          **/ScoreKeeper.apk
